<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management - Smart Grocery Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman", serif;
    background:#f4f4f4;
}

/* Navigation */

nav{
    background:#006400;
    color:white;
    padding:15px;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

/* Main Container */

.container{
    width:90%;
    margin:30px auto;
}

.container h2{
    text-align:center;
    color:#006400;
    margin-bottom:20px;
}

/* Form */

.form-box{
    background:white;
    border:1px solid #ccc;
    padding:20px;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #999;
}

.btn{
    background:#006400;
    color:white;
    border:none;
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
}

.btn:hover{
    background:#004d00;
}

/* Table */

.table-box{
    background:white;
    border:1px solid #ccc;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid #999;
}

th{
    background:#006400;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

.action-btn{
    padding:5px 10px;
    border:none;
    color:white;
    cursor:pointer;
}

.edit{
    background:orange;
}

.delete{
    background:red;
}

/* Footer */

footer{
    background:#006400;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">Smart Grocery Hub</div>
</nav>

<div class="container">

    <h2>Inventory Management</h2>

    <div class="form-box">

        <label>Product Name</label>
        <input type="text" placeholder="Enter Product Name">

        <label>Category</label>
        <select>
            <option>Rice</option>
            <option>Oil</option>
            <option>Biscuits</option>
            <option>Beverages</option>
            <option>Snacks</option>
        </select>

        <label>Quantity</label>
        <input type="number" placeholder="Enter Quantity">

        <label>Expiry Date</label>
        <input type="date">

        <button class="btn">Add Product</button>

    </div>

    <div class="table-box">

        <h3>Current Inventory</h3>

        <br>

        <table>

            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Expiry Date</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rice</td>
                <td>Food Grains</td>
                <td>100 Kg</td>
                <td>12-12-2026</td>
                <td>
                    <button class="action-btn edit">Edit</button>
                    <button class="action-btn delete">Delete</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sugar</td>
                <td>Food Grains</td>
                <td>50 Kg</td>
                <td>15-11-2026</td>
                <td>
                    <button class="action-btn edit">Edit</button>
                    <button class="action-btn delete">Delete</button>
                </td>
            </tr>

        </table>

    </div>

</div>

<footer>
    <p>© 2026 Smart Grocery Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
