<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Smart Grocery Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman", serif;
    background:#f4f4f4;
}

nav{
    background:#006400;
    color:white;
    padding:15px;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container{
    width:70%;
    margin:30px auto;
}

.container h2{
    text-align:center;
    color:#006400;
    margin-bottom:20px;
}

.profile-box{
    background:white;
    border:1px solid #ccc;
    padding:30px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #999;
}

.btn{
    background:#006400;
    color:white;
    border:none;
    padding:10px 20px;
    margin-top:20px;
    cursor:pointer;
}

.btn:hover{
    background:#004d00;
}

footer{
    background:#006400;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">Smart Grocery Hub</div>
</nav>

<div class="container">

    <h2>My Profile</h2>

    <div class="profile-box">

        <label>Full Name</label>
        <input type="text" value="John Kumar">

        <label>Business Name</label>
        <input type="text" value="Kumar Grocery Store">

        <label>Email</label>
        <input type="email" value="john@gmail.com">

        <label>Phone Number</label>
        <input type="text" value="9876543210">

        <label>Address</label>
        <textarea rows="4">Madurai, Tamil Nadu</textarea>

        <button class="btn">Update Profile</button>

    </div>

</div>

<footer>
    <p>© 2026 Smart Grocery Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
