<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Grocery Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman", serif;
    background-color:#f4f4f4;
}

/* Navigation */

nav{
    background:#006400;
    color:white;
    padding:15px;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

/* Login Container */

.container{
    width:450px;
    margin:60px auto;
    background:white;
    border:1px solid #ccc;
    padding:30px;
}

.container h2{
    text-align:center;
    color:#006400;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-size:18px;
}

input,
select{
    width:100%;
    padding:10px;
    border:1px solid #999;
    font-size:16px;
}

button{
    width:100%;
    background:#006400;
    color:white;
    border:none;
    padding:12px;
    margin-top:20px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#004d00;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#006400;
    text-decoration:none;
}

/* Footer */

footer{
    background:#006400;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:50px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">Smart Grocery Hub</div>
</nav>

<div class="container">

    <h2>Login</h2>

    <form>

        <label>Email Address</label>
        <input type="email" placeholder="Enter Email">

        <label>Password</label>
        <input type="password" placeholder="Enter Password">

        <label>Login As</label>
        <select>
            <option>Shopkeeper</option>
            <option>Retailer</option>
            <option>Wholesaler</option>
            <option>Admin</option>
        </select>

        <button type="submit">Login</button>

    </form>

    <p>
        Don't have an account?
        <a href="register.html">Register Here</a>
    </p>

</div>

<footer>
    <p>© 2026 Smart Grocery Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
